name: Trigger web app workflow

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  trigger:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TARGET_REPO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ErlendBerntsen/AsyncDeployPoc/dispatches \
            -d '{"event_type": "pr-merged", "client_payload": {"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}}'
