name: Trigger web app workflow

on:
  pull_request:
    types: [closed]
    branches:
      - main
env:
  IMAGE_NAME: async-deploy-poc

jobs:
 build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Use the git tag as the version (e.g. v1.2.3 → 1.2.3)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Fall back to short SHA for branch pushes
            VERSION="0.0.0-$(echo $GITHUB_SHA | head -c 7)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}/{{secrets.DOCKERHUB_USERNAME}}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_CONFIGURATION=Release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Published image digest ${{ steps.meta.outputs.digest }}"
        
 dispatch:
      name: "Dispatch signal to consumers"
      if: github.event.pull_request.merged == true
      runs-on: ubuntu-latest
      steps:
        - name: Trigger workflow
          run: |
            curl -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.TARGET_REPO_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/ErlendBerntsen/AsyncDeployPoc/dispatches \
              -d '{"event_type": "pr-merged", "client_payload": {"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}}'
